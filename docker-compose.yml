services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-narrative}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-narrative}
      POSTGRES_DB: ${POSTGRES_DB:-narrative_clustering}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
