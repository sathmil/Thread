name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: narrative
          POSTGRES_PASSWORD: narrative
          POSTGRES_DB: narrative_clustering
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://narrative:narrative@localhost:5432/narrative_clustering

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      # sentence-transformers loads its model with local_files_only=True (see
      # app/embeddings.py) so it never silently falls back to a different
      # scorer at test time — that means the weights must already be cached
      # before pytest runs, or every embedding call would raise.
      - name: Cache sentence-transformers model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      - name: Ensure embedding model weights are downloaded
        run: python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"

      - name: Run database migrations
        working-directory: backend
        run: alembic upgrade head

      # Also the evaluation smoke-test fixture: tests/api/test_evaluation.py
      # asserts Recall@K/MRR against this exact seeded dataset, so seeding
      # here doubles as "assert retrieval metrics don't regress."
      - name: Seed the demo dataset
        working-directory: backend
        run: python -m scripts.seed

      - name: Run backend tests
        working-directory: backend
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
